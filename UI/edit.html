<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="edit.css">

</head>

<body>

<header>
    <nav class="navbar">
        <ul>
            <li><img src="resumelogo.png" alt="Logo"></li>
            <li><a href="/upload.html">Upload</a></li>
            <li><a href="/resumes.html">Resumes</a></li>
            <li><a href="/login.html">Logout</a></li>
        </ul>
    </nav>
</header>

<div class="container">

    <!-- Resume Name -->
    <div class="resumeName">
        <label>Resume Name:</label>
        <input type="text" id="resumeTitle" value="Resume1">
        
    </div>

    <!-- Filters -->
    <div class="filters">
        <h3>Set Filters</h3>

        <select id="location">
            <option value="">Location</option>
            <option value="<10 miles">< 10 miles</option>
            <option value="<25 miles">< 25 miles</option>
            <option value="<50 miles">< 50 miles</option> 
            <option value="<100 miles">< 100 miles</option>
        </select>

        <select id="salary">
            <option value="">Salary</option>
            <option value="<20000">< $20,000</option>
            <option value="20000-50000">$20,000-$50,000</option>
            <option value="$50,000-$80,000">$50,000-$80,000</option> 
            <option value=">$80,000">>$80,000</option>
        </select>

        <select id="experience">
            <option value="">Experience</option>
            <option value="intern">Internship</option>
            <option value="entry">Entry-Level</option>
            <option value="<25 miles">Mid-Level</option> 
            <option value="<50 miles">Senior Level</option>
        </select>

        <button onclick="saveAll()">Save All</button>
    </div>

    <!-- Skills Section -->
    <div class="skills">
        
        <!-- Extracted Skills -->
        <div class="skills-box">
            <h2>Skills Extracted</h2>

            <input type="text" id="skillInput" placeholder="Add skill...">
            <button onclick="addSkill()">Add</button>

            <div id="skillsList"></div>
        </div>



    </div>

</div>

<script src="app.js"></script>
</body>
</html>
